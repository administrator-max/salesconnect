name: Deploy to FTP (Niagahoster)

# Auto-deploy SalesConnect to the live host on every push to main.
# Uses git-ftp so it honours .git-ftp-ignore and only uploads changed files.
# Credentials come from repo secrets (Settings -> Secrets and variables -> Actions):
#   FTP_HOST      e.g. 45.130.231.110
#   FTP_USER      e.g. salesconnect@salesconnect.tapworkspace.com
#   FTP_PASSWORD  the FTP account password
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Never let two deploys run at once (git-ftp state on the server is single-writer).
concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — git-ftp needs it to diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ftp
        run: |
          sudo apt-get update
          sudo apt-get install -y git-ftp

      - name: Deploy via git-ftp (explicit FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${FTP_HOST}" ] || [ -z "${FTP_USER}" ] || [ -z "${FTP_PASSWORD}" ]; then
            echo "::error::Missing FTP_HOST / FTP_USER / FTP_PASSWORD secrets. Add them in repo Settings."
            exit 1
          fi
          # Keep credentials out of argv/logs — git-ftp reads them from git config.
          # ftpes:// = FTP over explicit TLS (encrypts login on the wire).
          # insecure = skip cert hostname check (we connect by IP; transport is still encrypted).
          git config git-ftp.url      "ftpes://${FTP_HOST}/"
          git config git-ftp.user     "${FTP_USER}"
          git config git-ftp.password "${FTP_PASSWORD}"
          git config git-ftp.insecure 1

          # Incremental push. If the server has no .git-ftp.log yet (first ever deploy),
          # fall back to init to establish the baseline + create the log.
          if ! git ftp push --verbose; then
            echo "push failed (likely first run / no .git-ftp.log on server) — running init..."
            git ftp init --verbose
          fi

      - name: Done
        run: echo "Deployed to https://salesconnect.tapworkspace.com/"
